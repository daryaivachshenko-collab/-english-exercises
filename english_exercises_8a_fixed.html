<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Фразеологизмы с животными</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #131c4a;
      --bg2: #123d78;
      --panel: #24345d;
      --panel2: #2f3f68;
      --active: #f3f4f6;
      --accent: #ffb000;
      --violet: #7b1fa2;
      --text: #f8fafc;
      --muted: #b5c2df;
      --chip: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e9e9e9;
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 26px 12px;
    }

    .app {
      width: min(760px, 100%);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      border-radius: 34px;
      padding: 28px 24px 24px;
      position: relative;
      overflow: hidden;
    }

    .title { text-align: center; margin-bottom: 20px; }
    .title h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.9rem);
      line-height: 1.2;
    }
    .title p { color: #9ac4ff; font-size: 1.5rem; margin-bottom: 8px; }
    .title .sub {
      color: #9ac4ff;
      font-size: clamp(1rem, 2vw, 1.55rem);
      font-style: italic;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: #22325d;
      padding: 8px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .tab {
      border: none;
      border-radius: 14px;
      color: #95b4e8;
      background: transparent;
      font-size: clamp(1rem, 2.4vw, 1.8rem);
      font-weight: 800;
      padding: 12px 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .tab.active { background: var(--active); color: #1c2547; }

    .view { display: none; }
    .view.active { display: block; }

    .card {
      background: #ff9f00;
      border-radius: 26px;
      padding: 20px;
      text-align: center;
      color: #fff;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .badge {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(0,0,0,0.18);
      padding: 7px 12px;
      border-radius: 12px;
      font-size: .95rem;
      font-weight: 800;
    }

    .card-emoji { font-size: clamp(3rem, 10vw, 5rem); margin-bottom: 8px; }
    .card-en {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 3rem);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .card-ru { font-size: clamp(1.1rem, 3.2vw, 2rem); font-style: italic; margin-bottom: 12px; }

    .actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    .btn {
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      padding: 11px 16px;
      font-size: .95rem;
    }

    .btn-dark { background: rgba(0,0,0,0.2); color: #fff; }
    .btn-light { background: #ffffff; color: #1a244b; }

    .meaning {
      margin-top: 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 1rem;
      display: none;
    }

    .nav-row {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 74px 1fr 74px;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      border: none;
      border-radius: 16px;
      background: #476a9d;
      color: #fff;
      font-size: 1.8rem;
      height: 64px;
      cursor: pointer;
      font-weight: 700;
    }
    .counter { text-align: center; font-size: 1.8rem; color: #cae2ff; }

    .dots { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .dot { width: 11px; height: 11px; border-radius: 999px; background: rgba(255,255,255,0.4); }
    .dot.active { background: #9cc4ff; }

    .list-wrap { display: flex; flex-direction: column; gap: 10px; }

    .item {
      background: #2d3f67;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      overflow: hidden;
    }

    .item-head {
      width: 100%;
      border: none;
      background: transparent;
      color: #fff;
      font-size: clamp(1rem, 2.8vw, 1.9rem);
      font-family: 'Playfair Display', serif;
      text-align: left;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
    }

    .item-left { display: flex; align-items: center; gap: 12px; }
    .item-body {
      display: none;
      padding: 0 16px 14px;
      color: #d9e6ff;
      font-size: 1rem;
      line-height: 1.55;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      color: #cfe0ff;
      font-size: 1.4rem;
    }

    .stars { color: #facc15; font-weight: 900; }

    .question {
      background: linear-gradient(180deg, #8a2be2, #7a1cb6);
      border-radius: 22px;
      padding: 20px 16px;
      text-align: center;
      margin-bottom: 12px;
    }

    .question .q-label { font-weight: 800; color: #e9d5ff; font-size: 1rem; margin-bottom: 8px; text-transform: uppercase; }
    .question .q-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5vw, 2.9rem);
      margin-bottom: 10px;
    }

    .choices { display: grid; gap: 10px; }
    .choice {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 14px;
      background: #2f486f;
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      text-align: left;
      padding: 13px 16px;
      cursor: pointer;
    }

    .choice.correct { background: #166534; }
    .choice.wrong { background: #9f1239; }

    .game-controls { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }

    .small-muted { color: #b8c6e8; font-size: .95rem; }

    .footer-note { margin-top: 12px; color: #a8b8de; font-size: .9rem; text-align: center; }
  </style>
</head>
<body>
  <main class="app">
    <section class="title">
      <p>🐾</p>
      <h1>Фразеологизмы с животными</h1>
      <div class="sub">Английский и русский язык</div>
    </section>

    <nav class="tabs">
      <button class="tab active" data-view="dict">📖 Словарик</button>
      <button class="tab" data-view="all">📋 Все слова</button>
      <button class="tab" data-view="game">🎮 Игра</button>
    </nav>

    <section class="view active" id="view-dict">
      <article class="card">
        <div class="badge" id="analogyBadge">Полный аналог</div>
        <div class="card-emoji" id="dictEmoji"></div>
        <div class="card-en" id="dictEn"></div>
        <div class="card-ru" id="dictRu"></div>
        <div class="actions">
          <button class="btn btn-dark" id="meaningBtn">Нажми, чтобы узнать значение</button>
          <button class="btn btn-light" id="speakBtn">🔊 Озвучить</button>
        </div>
        <div class="meaning" id="dictMeaning"></div>
      </article>

      <div class="nav-row">
        <button class="nav-btn" id="prevBtn">‹</button>
        <div class="counter" id="dictCounter"></div>
        <button class="nav-btn" id="nextBtn">›</button>
      </div>
      <div class="dots" id="dictDots"></div>
    </section>

    <section class="view" id="view-all">
      <div class="list-wrap" id="allList"></div>
    </section>

    <section class="view" id="view-game">
      <div class="game-header">
        <div id="questionNum">Вопрос 1 из 10</div>
        <div class="stars">⭐ <span id="score">0</span></div>
      </div>

      <div class="question">
        <div class="q-label">ЧТО ОЗНАЧАЕТ ВЫРАЖЕНИЕ?</div>
        <div class="q-text" id="qText"></div>
        <button class="btn btn-light" id="speakGameBtn">🔊 Озвучить</button>
      </div>

      <div class="choices" id="choices"></div>

      <div class="game-controls">
        <button class="btn btn-light" id="nextQuestionBtn">Следующий вопрос</button>
        <button class="btn btn-dark" id="restartBtn">Начать заново</button>
      </div>
      <div class="small-muted" id="gameHint">Выбери один вариант ответа.</div>
      <div class="footer-note">В игре используется 10 случайных фразеологизмов из 50.</div>
    </section>
  </main>

  <script>
    const idioms = [
      { emoji:'🦁', en:'as brave as a lion', ru:'смелый как лев', meaning:'о человеке, который совсем не боится трудностей', type:'Полный аналог' },
      { emoji:'🦊', en:'sly as a fox', ru:'хитрый как лиса', meaning:'очень хитрый и изворотливый', type:'Полный аналог' },
      { emoji:'🐝', en:'as busy as a bee', ru:'трудолюбивый как пчела', meaning:'постоянно занят делами', type:'Близкий аналог' },
      { emoji:'🐦', en:'kill two birds with one stone', ru:'убить двух зайцев одним выстрелом', meaning:'сделать сразу два дела одним действием', type:'Функциональный аналог' },
      { emoji:'🐑', en:'black sheep', ru:'белая ворона / паршивая овца', meaning:'человек, который сильно отличается от своей группы', type:'Культурный аналог' },
      { emoji:'🐟', en:'a fish out of water', ru:'не в своей тарелке', meaning:'чувствовать себя неуютно в новой среде', type:'Функциональный аналог' },
      { emoji:'🐈', en:'let the cat out of the bag', ru:'выдать секрет', meaning:'случайно раскрыть тайну', type:'Функциональный аналог' },
      { emoji:'🐶', en:'work like a dog', ru:'работать как проклятый', meaning:'очень много и тяжело работать', type:'Функциональный аналог' },
      { emoji:'🐺', en:'cry wolf', ru:'бить ложную тревогу', meaning:'поднимать панику без причины', type:'Функциональный аналог' },
      { emoji:'🐴', en:'hold your horses', ru:'притормози', meaning:'призыв не спешить', type:'Функциональный аналог' },
      { emoji:'🐍', en:'a snake in the grass', ru:'скрытый враг', meaning:'человек, который притворяется другом, но вредит', type:'Функциональный аналог' },
      { emoji:'🐱', en:'curiosity killed the cat', ru:'любопытство до добра не доводит', meaning:'излишнее любопытство может навредить', type:'Близкий аналог' },
      { emoji:'🐘', en:'the elephant in the room', ru:'слон в комнате', meaning:'очевидная проблема, о которой все молчат', type:'Полный аналог' },
      { emoji:'🐭', en:'quiet as a mouse', ru:'тихий как мышка', meaning:'очень тихий и незаметный', type:'Полный аналог' },
      { emoji:'🐢', en:'slow as a turtle', ru:'медленный как черепаха', meaning:'очень медленно делать что-то', type:'Близкий аналог' },
      { emoji:'🐇', en:'breed like rabbits', ru:'плодиться как кролики', meaning:'очень быстро увеличиваться в количестве', type:'Полный аналог' },
      { emoji:'🦉', en:'as wise as an owl', ru:'мудрый как сова', meaning:'очень мудрый и рассудительный', type:'Полный аналог' },
      { emoji:'🦅', en:'watch like a hawk', ru:'следить как ястреб', meaning:'очень внимательно наблюдать', type:'Близкий аналог' },
      { emoji:'🐒', en:'monkey business', ru:'глупые проделки', meaning:'несерьёзное или нечестное поведение', type:'Функциональный аналог' },
      { emoji:'🦆', en:'water off a duck’s back', ru:'как с гуся вода', meaning:'критика или проблемы не задевают человека', type:'Функциональный аналог' },
      { emoji:'🐔', en:'chicken out', ru:'струсить', meaning:'испугаться и отказаться в последний момент', type:'Функциональный аналог' },
      { emoji:'🐷', en:'eat like a pig', ru:'есть как свинья', meaning:'есть очень неаккуратно', type:'Близкий аналог' },
      { emoji:'🐂', en:'take the bull by the horns', ru:'взять быка за рога', meaning:'решительно взяться за трудную задачу', type:'Полный аналог' },
      { emoji:'🦓', en:'zebra crossing', ru:'пешеходный переход', meaning:'устойчивое выражение про дорожную разметку', type:'Языковая единица' },
      { emoji:'🐫', en:'the last straw that breaks the camel’s back', ru:'последняя капля', meaning:'незначительное событие, после которого терпение заканчивается', type:'Функциональный аналог' },
      { emoji:'🐎', en:'straight from the horse’s mouth', ru:'из первых уст', meaning:'информация от самого источника', type:'Функциональный аналог' },
      { emoji:'🦇', en:'blind as a bat', ru:'слепой как крот', meaning:'плохо видеть', type:'Функциональный аналог' },
      { emoji:'🦌', en:'like a deer in the headlights', ru:'как олень в свете фар', meaning:'сильно растеряться', type:'Культурный аналог' },
      { emoji:'🦢', en:'swan song', ru:'лебединая песня', meaning:'последнее яркое выступление перед завершением карьеры', type:'Полный аналог' },
      { emoji:'🐊', en:'crocodile tears', ru:'крокодиловы слёзы', meaning:'неискреннее сочувствие', type:'Полный аналог' },
      { emoji:'🐬', en:'so long and thanks for all the fish', ru:'ироничное прощание', meaning:'шутливое выражение при уходе', type:'Культурный аналог' },
      { emoji:'🦃', en:'talk turkey', ru:'говорить по делу', meaning:'обсуждать серьёзно и конкретно', type:'Функциональный аналог' },
      { emoji:'🦔', en:'hedgehog idea', ru:'концепция ежа', meaning:'простая ключевая идея, на которой всё строится', type:'Культурный аналог' },
      { emoji:'🦈', en:'a loan shark', ru:'кредитная акула', meaning:'человек, дающий деньги под грабительские проценты', type:'Калька' },
      { emoji:'🐓', en:'rule the roost', ru:'командовать в доме', meaning:'быть главным в семье или группе', type:'Функциональный аналог' },
      { emoji:'🐧', en:'odd penguin out', ru:'белая ворона', meaning:'тот, кто не похож на остальных', type:'Функциональный аналог' },
      { emoji:'🦜', en:'parrot fashion', ru:'как попугай', meaning:'бездумно повторять чужие слова', type:'Полный аналог' },
      { emoji:'🐪', en:'camel through the eye of a needle', ru:'верблюд в игольное ушко', meaning:'о почти невозможном', type:'Библейский аналог' },
      { emoji:'🦖', en:'a dinosaur company', ru:'компания-динозавр', meaning:'устаревшая организация, не готовая к изменениям', type:'Культурный аналог' },
      { emoji:'🐞', en:'lucky ladybug', ru:'божья коровка на удачу', meaning:'символ удачи', type:'Культурный образ' },
      { emoji:'🕷️', en:'caught in a spider’s web', ru:'попасть в паутину', meaning:'оказаться в ловушке обстоятельств', type:'Функциональный аналог' },
      { emoji:'🐌', en:'at a snail’s pace', ru:'черепашьим шагом', meaning:'крайне медленно', type:'Функциональный аналог' },
      { emoji:'🦬', en:'buffalo someone', ru:'запутать кого-то', meaning:'ввести в заблуждение напором', type:'Культурный аналог' },
      { emoji:'🦦', en:'playful as an otter', ru:'игривый как выдра', meaning:'очень подвижный и весёлый', type:'Близкий аналог' },
      { emoji:'🐐', en:'the GOAT', ru:'лучший из лучших', meaning:'greatest of all time; выдающийся человек', type:'Современный сленг' },
      { emoji:'🦩', en:'stand out like a flamingo', ru:'сильно выделяться', meaning:'быть слишком заметным на фоне других', type:'Культурный аналог' },
      { emoji:'🦝', en:'sly as a raccoon', ru:'хитрый как енот', meaning:'ловко добиваться своего', type:'Близкий аналог' },
      { emoji:'🦥', en:'lazy as a sloth', ru:'ленивый как ленивец', meaning:'очень ленивый человек', type:'Близкий аналог' },
      { emoji:'🦚', en:'proud as a peacock', ru:'важный как павлин', meaning:'демонстративно гордиться собой', type:'Полный аналог' },
      { emoji:'🐧', en:'break the ice with a penguin joke', ru:'растопить лёд шуткой', meaning:'снять напряжение в начале общения', type:'Функциональный аналог' }
    ];

    const tabs = [...document.querySelectorAll('.tab')];
    const views = {
      dict: document.getElementById('view-dict'),
      all: document.getElementById('view-all'),
      game: document.getElementById('view-game')
    };

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const key = tab.dataset.view;
        Object.values(views).forEach(v => v.classList.remove('active'));
        views[key].classList.add('active');
      });
    });

    let dictIndex = 0;
    const dictEmoji = document.getElementById('dictEmoji');
    const dictEn = document.getElementById('dictEn');
    const dictRu = document.getElementById('dictRu');
    const dictMeaning = document.getElementById('dictMeaning');
    const dictCounter = document.getElementById('dictCounter');
    const dictDots = document.getElementById('dictDots');
    const meaningBtn = document.getElementById('meaningBtn');
    const speakBtn = document.getElementById('speakBtn');
    const analogyBadge = document.getElementById('analogyBadge');

    function renderDots() {
      dictDots.innerHTML = '';
      idioms.forEach((_, i) => {
        const dot = document.createElement('span');
        dot.className = `dot ${i === dictIndex ? 'active' : ''}`;
        dictDots.appendChild(dot);
      });
    }

    function renderDict() {
      const item = idioms[dictIndex];
      dictEmoji.textContent = item.emoji;
      dictEn.textContent = item.en;
      dictRu.textContent = `«${item.ru}»`;
      dictMeaning.textContent = item.meaning;
      dictMeaning.style.display = 'none';
      meaningBtn.textContent = 'Нажми, чтобы узнать значение';
      dictCounter.textContent = `${dictIndex + 1} / ${idioms.length}`;
      analogyBadge.textContent = item.type;
      renderDots();
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      dictIndex = (dictIndex - 1 + idioms.length) % idioms.length;
      renderDict();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      dictIndex = (dictIndex + 1) % idioms.length;
      renderDict();
    });

    meaningBtn.addEventListener('click', () => {
      const isHidden = dictMeaning.style.display !== 'block';
      dictMeaning.style.display = isHidden ? 'block' : 'none';
      meaningBtn.textContent = isHidden ? 'Скрыть значение' : 'Нажми, чтобы узнать значение';
    });

    function speak(text) {
      if (!('speechSynthesis' in window)) {
        alert('Озвучка не поддерживается в этом браузере.');
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.95;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

    speakBtn.addEventListener('click', () => speak(idioms[dictIndex].en));

    function renderAllList() {
      const box = document.getElementById('allList');
      box.innerHTML = '';
      idioms.forEach((item, i) => {
        const wrap = document.createElement('article');
        wrap.className = 'item';

        const head = document.createElement('button');
        head.className = 'item-head';
        head.innerHTML = `<span class="item-left"><span>${item.emoji}</span><span>${i + 1}. ${item.en}</span></span><span>▾</span>`;

        const body = document.createElement('div');
        body.className = 'item-body';
        body.innerHTML = `<p><strong>Перевод:</strong> ${item.ru}</p><p><strong>Значение:</strong> ${item.meaning}</p><p><strong>Тип:</strong> ${item.type}</p><div class="actions" style="justify-content:flex-start;margin-top:8px"><button class="btn btn-light">🔊 Озвучить</button></div>`;

        head.addEventListener('click', () => {
          const opened = body.style.display === 'block';
          body.style.display = opened ? 'none' : 'block';
        });

        body.querySelector('button').addEventListener('click', () => speak(item.en));

        wrap.append(head, body);
        box.appendChild(wrap);
      });
    }

    const qText = document.getElementById('qText');
    const choices = document.getElementById('choices');
    const questionNum = document.getElementById('questionNum');
    const scoreEl = document.getElementById('score');
    const hint = document.getElementById('gameHint');
    const speakGameBtn = document.getElementById('speakGameBtn');

    let gameSet = [];
    let gameIndex = 0;
    let score = 0;
    let locked = false;

    function shuffled(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function pickGameSet() {
      gameSet = shuffled(idioms).slice(0, 10);
      gameIndex = 0;
      score = 0;
      scoreEl.textContent = score;
      renderQuestion();
    }

    function renderQuestion() {
      locked = false;
      const item = gameSet[gameIndex];
      questionNum.textContent = `Вопрос ${gameIndex + 1} из ${gameSet.length}`;
      qText.textContent = item.en;
      hint.textContent = 'Выбери один вариант ответа.';

      const wrong = shuffled(idioms.filter(x => x.en !== item.en)).slice(0, 3).map(x => x.meaning);
      const options = shuffled([item.meaning, ...wrong]);

      choices.innerHTML = '';
      options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        const letter = ['A', 'B', 'C', 'D'][idx];
        btn.className = 'choice';
        btn.textContent = `${letter}. ${opt}`;
        btn.addEventListener('click', () => {
          if (locked) return;
          locked = true;
          const correct = opt === item.meaning;
          if (correct) {
            btn.classList.add('correct');
            score += 1;
            scoreEl.textContent = score;
            hint.textContent = '✅ Верно!';
          } else {
            btn.classList.add('wrong');
            hint.textContent = `❌ Неверно. Правильный ответ: ${item.meaning}`;
            [...choices.children].forEach(node => {
              if (node.textContent.slice(3) === item.meaning) node.classList.add('correct');
            });
          }
        });
        choices.appendChild(btn);
      });
    }

    document.getElementById('nextQuestionBtn').addEventListener('click', () => {
      if (gameIndex < gameSet.length - 1) {
        gameIndex += 1;
        renderQuestion();
      } else {
        hint.textContent = `Игра окончена! Результат: ${score} из ${gameSet.length}. Нажми «Начать заново».`;
      }
    });

    document.getElementById('restartBtn').addEventListener('click', pickGameSet);
    speakGameBtn.addEventListener('click', () => {
      if (gameSet[gameIndex]) speak(gameSet[gameIndex].en);
    });

    renderDict();
    renderAllList();
    pickGameSet();
  </script>
</body>
</html>
